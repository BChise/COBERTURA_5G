<!DOCTYPE html>
<html>
<head>
    <title>Simulador 5G</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        #map {
            height: 100vh;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div id="loading" style="
    position:absolute;
    top:50px;
    left:10px;
    background:white;
    padding:5px;
    z-index:1000;
    display:none;
">
    Calculando...
</div>

<button onclick="simular()" style="
    position:absolute;
    top:10px;
    left:10px;
    z-index:1000;
">
    Simular
</button>


<button onclick="limpiar()" style="position:absolute;top:10px;left:100px;z-index:1000;">
    Limpiar
</button>

<!-- Scripts -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
<script src="app.js"></script>

</body>

</html>
